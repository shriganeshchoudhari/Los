  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "JWT access token obtained from OTP verify or LDAP login"
      }
    },
    "schemas": {
      "SendOtpRequest": {
        "type": "object",
        "required": ["mobile", "purpose"],
        "properties": {
          "mobile": { "type": "string", "pattern": "^[6-9]\\d{9}$", "example": "9876543210" },
          "purpose": { "type": "string", "enum": ["LOGIN", "CONSENT", "ESIGN", "BUREAU_CONSENT"] },
          "channel": { "type": "string", "enum": ["SMS", "WHATSAPP"], "default": "SMS" }
        }
      },
      "SendOtpResponse": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean" },
          "data": {
            "type": "object",
            "properties": {
              "sessionId": { "type": "string" },
              "maskedMobile": { "type": "string", "example": "*******3210" },
              "expiresIn": { "type": "integer", "example": 300 }
            }
          }
        }
      },
      "VerifyOtpRequest": {
        "type": "object",
        "required": ["mobile", "otp", "sessionId"],
        "properties": {
          "mobile": { "type": "string" },
          "otp": { "type": "string", "minLength": 6, "maxLength": 6 },
          "sessionId": { "type": "string" }
        }
      },
      "VerifyOtpResponse": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean" },
          "data": {
            "type": "object",
            "properties": {
              "accessToken": { "type": "string" },
              "refreshToken": { "type": "string" },
              "expiresIn": { "type": "integer", "example": 900 }
            }
          }
        }
      },
      "RefreshTokenRequest": {
        "type": "object",
        "required": ["refreshToken"],
        "properties": { "refreshToken": { "type": "string" } }
      },
      "CreateApplicationRequest": {
        "type": "object",
        "required": ["loanType", "channelCode", "applicant", "employmentDetails", "loanRequirement"],
        "properties": {
          "loanType": { "type": "string", "enum": ["PERSONAL_LOAN", "HOME_LOAN", "LAP", "VEHICLE_LOAN_TWO_WHEELER", "VEHICLE_LOAN_FOUR_WHEELER", "EDUCATION_LOAN", "GOLD_LOAN", "MSME_TERM_LOAN"] },
          "channelCode": { "type": "string", "example": "MOBILE_APP" },
          "branchCode": { "type": "string", "example": "MH001" },
          "applicant": { "$ref": "#/components/schemas/ApplicantData" },
          "employmentDetails": { "$ref": "#/components/schemas/EmploymentData" },
          "loanRequirement": { "$ref": "#/components/schemas/LoanRequirementData" }
        }
      },
      "ApplicantData": {
        "type": "object",
        "required": ["fullName", "dob", "gender", "mobile", "residentialStatus"],
        "properties": {
          "fullName": { "type": "string", "minLength": 2, "maxLength": 100 },
          "dob": { "type": "string", "format": "date", "example": "1990-04-21" },
          "gender": { "type": "string", "enum": ["MALE", "FEMALE", "TRANSGENDER"] },
          "maritalStatus": { "type": "string", "enum": ["SINGLE", "MARRIED", "DIVORCED", "WIDOWED"] },
          "mobile": { "type": "string" },
          "email": { "type": "string", "format": "email" },
          "residentialStatus": { "type": "string", "enum": ["RESIDENT_INDIAN", "NON_RESIDENT_INDIAN"] },
          "addresses": { "type": "array", "items": { "$ref": "#/components/schemas/AddressData" } },
          "yearsAtCurrentAddress": { "type": "integer" },
          "ownOrRentedResidence": { "type": "string", "enum": ["OWNED", "RENTED", "PARENTAL", "HOSTEL"] }
        }
      },
      "EmploymentData": {
        "type": "object",
        "required": ["employmentType", "grossMonthlyIncome", "netMonthlyIncome", "totalAnnualIncome"],
        "properties": {
          "employmentType": { "type": "string", "enum": ["SALARIED_PRIVATE", "SALARIED_GOVT", "SELF_EMPLOYED_PROFESSIONAL", "SELF_EMPLOYED_NON_PROFESSIONAL", "BUSINESS_OWNER", "AGRICULTURIST", "PENSIONER"] },
          "employerName": { "type": "string" },
          "employerPAN": { "type": "string" },
          "designation": { "type": "string" },
          "totalWorkExperienceMonths": { "type": "integer" },
          "currentJobExperienceMonths": { "type": "integer" },
          "grossMonthlyIncome": { "type": "integer", "minimum": 1 },
          "netMonthlyIncome": { "type": "integer", "minimum": 1 },
          "totalAnnualIncome": { "type": "integer", "minimum": 1 }
        }
      },
      "LoanRequirementData": {
        "type": "object",
        "required": ["loanType", "requestedAmount", "requestedTenureMonths"],
        "properties": {
          "loanType": { "type": "string" },
          "requestedAmount": { "type": "integer", "minimum": 10000, "example": 500000 },
          "requestedTenureMonths": { "type": "integer", "minimum": 6, "maximum": 360, "example": 36 },
          "purposeDescription": { "type": "string" }
        }
      },
      "AddressData": {
        "type": "object",
        "properties": {
          "line1": { "type": "string" },
          "city": { "type": "string" },
          "district": { "type": "string" },
          "state": { "type": "string" },
          "pincode": { "type": "string", "pattern": "^[1-9]\\d{5}$" },
          "country": { "type": "string", "default": "IN" },
          "addressType": { "type": "string", "enum": ["CURRENT", "PERMANENT", "OFFICE"] }
        }
      },
      "ApplicationResponse": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean" },
          "data": {
            "type": "object",
            "properties": {
              "applicationId": { "type": "string", "format": "uuid" },
              "applicationNumber": { "type": "string", "example": "LOS-2026-MH-000001" },
              "status": { "type": "string" },
              "loanType": { "type": "string" },
              "requestedAmount": { "type": "integer" }
            }
          }
        }
      },
      "UpdateApplicationRequest": {
        "type": "object",
        "required": ["section", "data", "version"],
        "properties": {
          "section": { "type": "string", "enum": ["APPLICANT", "EMPLOYMENT", "LOAN_REQUIREMENT", "ADDRESS"] },
          "data": { "type": "object" },
          "version": { "type": "integer", "description": "Optimistic lock version" }
        }
      },
      "AutosaveRequest": {
        "type": "object",
        "required": ["section", "data"],
        "properties": {
          "section": { "type": "string" },
          "data": { "type": "object" }
        }
      },
      "ConsentRequest": {
        "type": "object",
        "required": ["applicationId", "consentType"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "consentType": { "type": "string", "enum": ["KYC_VERIFICATION", "BUREAU_PULL", "LOAN_AGREEMENT"] }
        }
      },
      "AadhaarInitRequest": {
        "type": "object",
        "required": ["aadhaarNumber", "applicationId"],
        "properties": {
          "aadhaarNumber": { "type": "string", "pattern": "^\\d{12}$", "description": "Encrypted in production" },
          "applicationId": { "type": "string", "format": "uuid" }
        }
      },
      "AadhaarInitResponse": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean" },
          "data": {
            "type": "object",
            "properties": {
              "txnId": { "type": "string", "description": "UIDAI transaction ID for verify step" }
            }
          }
        }
      },
      "AadhaarVerifyRequest": {
        "type": "object",
        "required": ["txnId", "otp", "applicationId"],
        "properties": {
          "txnId": { "type": "string" },
          "otp": { "type": "string", "minLength": 6, "maxLength": 6 },
          "applicationId": { "type": "string", "format": "uuid" }
        }
      },
      "KycRecordResponse": {
        "type": "object",
        "properties": {
          "kycId": { "type": "string" },
          "status": { "type": "string", "enum": ["VERIFIED", "FAILED", "PENDING"] },
          "aadhaarName": { "type": "string" },
          "aadhaarDob": { "type": "string" },
          "aadhaarAddress": { "type": "string" },
          "maskedAadhaar": { "type": "string", "example": "XXXX-XXXX-3456" }
        }
      },
      "PanVerifyRequest": {
        "type": "object",
        "required": ["panNumber", "fullName", "dob", "applicationId"],
        "properties": {
          "panNumber": { "type": "string", "pattern": "^[A-Z]{5}[0-9]{4}[A-Z]$" },
          "fullName": { "type": "string" },
          "dob": { "type": "string" },
          "applicationId": { "type": "string", "format": "uuid" }
        }
      },
      "FaceMatchRequest": {
        "type": "object",
        "required": ["applicationId", "selfieImageBase64"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "selfieImageBase64": { "type": "string", "description": "Base64-encoded JPEG selfie" }
        }
      },
      "PresignedUrlRequest": {
        "type": "object",
        "required": ["applicationId", "documentType", "mimeType"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "documentType": { "type": "string", "enum": ["SALARY_SLIP", "BANK_STATEMENT", "PAN_CARD", "AADHAAR_CARD", "VOTER_ID", "PASSPORT", "DRIVING_LICENSE", "ITR", "FORM_16", "OFFER_LETTER", "BUSINESS_PROOF"] },
          "mimeType": { "type": "string", "enum": ["application/pdf", "image/jpeg", "image/png"] }
        }
      },
      "DocumentReviewRequest": {
        "type": "object",
        "required": ["decision"],
        "properties": {
          "decision": { "type": "string", "enum": ["APPROVED", "REJECTED"] },
          "remarks": { "type": "string", "maxLength": 500 }
        }
      },
      "BureauPullRequest": {
        "type": "object",
        "required": ["applicationId", "consentOtp"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "consentOtp": { "type": "string", "description": "OTP for bureau consent" }
        }
      },
      "DisbursementRequest": {
        "type": "object",
        "required": ["applicationId", "amount", "beneficiaryAccountNumber", "beneficiaryIfsc"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "amount": { "type": "integer", "minimum": 1 },
          "beneficiaryAccountNumber": { "type": "string" },
          "beneficiaryIfsc": { "type": "string", "pattern": "^[A-Z]{4}0[A-Z0-9]{6}$" },
          "beneficiaryName": { "type": "string" },
          "mode": { "type": "string", "enum": ["IMPS", "NEFT", "RTGS"], "default": "IMPS" }
        }
      },
      "DecisionTriggerRequest": {
        "type": "object",
        "required": ["applicationId"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" }
        }
      },
      "DecisionResponse": {
        "type": "object",
        "properties": {
          "decisionId": { "type": "string" },
          "applicationId": { "type": "string" },
          "decisionType": { "type": "string", "enum": ["APPROVED", "REJECTED", "CONDITIONAL", "PENDING"] },
          "approvedAmount": { "type": "integer" },
          "rateOfInterestBps": { "type": "integer", "description": "Rate in basis points (e.g., 1050 = 10.50%)" },
          "approvedTenureMonths": { "type": "integer" },
          "rejectionReasonCode": { "type": "string" },
          "rejectionReason": { "type": "string" },
          "ruleResults": { "type": "array", "items": { "type": "object" } },
          "mlScore": { "type": "number" },
          "primaryBureauScore": { "type": "integer" },
          "policyVersion": { "type": "string" }
        }
      },
      "DecisionOverrideRequest": {
        "type": "object",
        "required": ["applicationId", "decision", "overrideReason"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "decision": { "type": "string", "enum": ["APPROVED", "REJECTED", "CONDITIONAL"] },
          "overrideReason": { "type": "string", "maxLength": 1000 }
        }
      },
      "SanctionLetterData": {
        "type": "object",
        "properties": {
          "applicationNumber": { "type": "string" },
          "customerName": { "type": "string" },
          "customerAddress": { "type": "string" },
          "sanctionedAmount": { "type": "integer" },
          "sanctionedAmountInWords": { "type": "string" },
          "rateOfInterestPercent": { "type": "number" },
          "tenureMonths": { "type": "integer" },
          "emiAmount": { "type": "integer" },
          "processingFeeAmount": { "type": "integer" },
          "totalPayableAmount": { "type": "integer" },
          "firstEmiDate": { "type": "string" },
          "lastEmiDate": { "type": "string" },
          "sanctionDate": { "type": "string" },
          "validUntil": { "type": "string" },
          "loanAccountNumber": { "type": "string" },
          "ifscCode": { "type": "string" },
          "branchName": { "type": "string" },
          "sanctioningAuthority": { "type": "string" },
          "prepaymentTerms": { "$ref": "#/components/schemas/PrepaymentTerms" },
          "foreclosureTerms": { "$ref": "#/components/schemas/ForeclosureTerms" }
        }
      },
      "PrepaymentTerms": {
        "type": "object",
        "properties": {
          "allowed": { "type": "boolean" },
          "lockInMonths": { "type": "integer" },
          "maxPercentPerYear": { "type": "number" },
          "penaltyPercent": { "type": "number" }
        }
      },
      "ForeclosureTerms": {
        "type": "object",
        "properties": {
          "allowed": { "type": "boolean" },
          "lockInMonths": { "type": "integer" },
          "minOutstandingBalance": { "type": "integer" },
          "processingFeePercent": { "type": "number" }
        }
      },
      "ESignInitiateRequest": {
        "type": "object",
        "required": ["applicationId", "signerName", "signerMobile", "signerEmail"],
        "properties": {
          "applicationId": { "type": "string", "format": "uuid" },
          "signerName": { "type": "string" },
          "signerMobile": { "type": "string" },
          "signerEmail": { "type": "string", "format": "email" },
          "signerAadhaar": { "type": "string" },
          "preVerified": { "type": "boolean" }
        }
      },
      "ESignVerifyRequest": {
        "type": "object",
        "required": ["transactionId", "otp", "aadhaarLast4"],
        "properties": {
          "transactionId": { "type": "string" },
          "otp": { "type": "string" },
          "aadhaarLast4": { "type": "string", "pattern": "^\\d{4}$" }
        }
      },
      "EmiCalculateRequest": {
        "type": "object",
        "required": ["principal", "annualRate", "tenureMonths"],
        "properties": {
          "principal": { "type": "integer", "minimum": 1 },
          "annualRate": { "type": "number", "minimum": 1, "maximum": 50 },
          "tenureMonths": { "type": "integer", "minimum": 1, "maximum": 360 }
        }
      },
      "NotificationSendRequest": {
        "type": "object",
        "required": ["channel", "recipientId", "templateName", "variables"],
        "properties": {
          "channel": { "type": "string", "enum": ["SMS", "EMAIL", "WHATSAPP", "PUSH"] },
          "recipientId": { "type": "string" },
          "templateName": { "type": "string" },
          "variables": { "type": "object" },
          "applicationId": { "type": "string", "format": "uuid" }
        }
      },
      "DsaRegisterRequest": {
        "type": "object",
        "required": ["companyName", "contactPerson", "mobile", "email", "pan", "gstin"],
        "properties": {
          "companyName": { "type": "string" },
          "contactPerson": { "type": "string" },
          "mobile": { "type": "string" },
          "email": { "type": "string", "format": "email" },
          "pan": { "type": "string" },
          "gstin": { "type": "string" },
          "address": { "$ref": "#/components/schemas/AddressData" },
          "bankAccount": {
            "type": "object",
            "properties": {
              "accountNumber": { "type": "string" },
              "ifsc": { "type": "string" },
              "accountHolderName": { "type": "string" }
            }
          }
        }
      },
      "DsaLoginRequest": {
        "type": "object",
        "required": ["partnerCode", "password"],
        "properties": {
          "partnerCode": { "type": "string" },
          "password": { "type": "string" }
        }
      },
      "DsaLoginResponse": {
        "type": "object",
        "properties": {
          "success": { "type": "boolean" },
          "data": {
            "type": "object",
            "properties": {
              "accessToken": { "type": "string" },
              "refreshToken": { "type": "string" },
              "partnerId": { "type": "string" },
              "partnerCode": { "type": "string" },
              "partnerName": { "type": "string" },
              "role": { "type": "string" },
              "expiresIn": { "type": "integer" }
            }
          }
        }
      }
    }
  }
}
