{
  "openapi": "3.0.3",
  "info": {
    "title": "LOS Platform API",
    "description": "Loan Origination System — REST API for all 8 microservices.\n\n## Base URLs\n- Auth: `http://localhost:3001`\n- Loan: `http://localhost:3003`\n- KYC: `http://localhost:3002`\n- Document: `http://localhost:3009`\n- Decision: `http://localhost:3004`\n- Integration: `http://localhost:3006`\n- Notification: `http://localhost:3007`\n- DSA: `http://localhost:3008`\n\n## Authentication\nAll protected endpoints require `Authorization: Bearer {accessToken}` header.\n\n## Response Format\n```json\n{ \"success\": true, \"data\": {...}, \"error\": null, \"timestamp\": \"...\", \"requestId\": \"...\" }\n```",
    "version": "1.0.0",
    "contact": { "name": "LOS Platform Team", "email": "los-platform@example.com" }
  },
  "servers": [
    { "url": "http://localhost:3001", "description": "Local Development" },
    { "url": "https://api.losbank.example.com", "description": "Production (via Kong Gateway)" }
  ],
  "tags": [
    { "name": "Auth", "description": "Authentication & sessions" },
    { "name": "Applications", "description": "Loan application management" },
    { "name": "KYC", "description": "Know Your Customer" },
    { "name": "Documents", "description": "Document management & OCR" },
    { "name": "Decision", "description": "Credit decision engine" },
    { "name": "Integration", "description": "Bureau, disbursement, NACH" },
    { "name": "Loan Services", "description": "EMI, sanction letter, agreements, PDD" },
    { "name": "Notifications", "description": "SMS, email, templates" },
    { "name": "Audit", "description": "Audit log queries" },
    { "name": "DSA", "description": "DSA partner portal" }
  ],
  "paths": {
    "/auth/otp/send": {
      "post": {
        "tags": ["Auth"],
        "summary": "Send OTP",
        "description": "Send a one-time password via SMS or WhatsApp for authentication.",
        "operationId": "sendOtp",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/SendOtpRequest" },
              "example": { "mobile": "9876543210", "purpose": "LOGIN", "channel": "SMS" }
            }
          }
        },
        "responses": {
          "200": { "description": "OTP sent successfully", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/SendOtpResponse" } } } },
          "429": { "description": "Rate limit exceeded" }
        }
      }
    },
    "/auth/otp/verify": {
      "post": {
        "tags": ["Auth"],
        "summary": "Verify OTP",
        "description": "Verify the OTP and receive JWT access + refresh tokens.",
        "operationId": "verifyOtp",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/VerifyOtpRequest" } } }
        },
        "responses": {
          "200": { "description": "OTP verified", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/VerifyOtpResponse" } } } },
          "400": { "description": "Invalid OTP or expired session" },
          "401": { "description": "Max attempts exceeded — session locked" }
        }
      }
    },
    "/auth/token/refresh": {
      "post": {
        "tags": ["Auth"],
        "summary": "Refresh Access Token",
        "operationId": "refreshToken",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/RefreshTokenRequest" } } }
        },
        "responses": {
          "200": { "description": "New tokens issued", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/VerifyOtpResponse" } } } },
          "401": { "description": "Invalid or expired refresh token" }
        }
      }
    },
    "/auth/logout": {
      "post": {
        "tags": ["Auth"],
        "summary": "Logout",
        "description": "Revoke current session and invalidate tokens.",
        "operationId": "logout",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "Logged out successfully" },
          "401": { "description": "Unauthorized" }
        }
      }
    },
    "/applications": {
      "post": {
        "tags": ["Applications"],
        "summary": "Create Application",
        "description": "Create a new loan application. Idempotent via `X-Idempotency-Key` header.",
        "operationId": "createApplication",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/CreateApplicationRequest" } } }
        },
        "responses": {
          "201": { "description": "Application created", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ApplicationResponse" } } } },
          "409": { "description": "Duplicate application (same PAN + loan type within 30 days)" },
          "422": { "description": "Validation error" }
        }
      },
      "get": {
        "tags": ["Applications"],
        "summary": "List Applications",
        "description": "Paginated listing for loan officer worklist.",
        "operationId": "listApplications",
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "name": "status", "in": "query", "schema": { "type": "string", "example": "DRAFT" } },
          { "name": "branchCode", "in": "query", "schema": { "type": "string", "example": "MH001" } },
          { "name": "page", "in": "query", "schema": { "type": "integer", "default": 0 } },
          { "name": "size", "in": "query", "schema": { "type": "integer", "default": 20 } }
        ],
        "responses": {
          "200": { "description": "Paginated application list" }
        }
      }
    },
    "/applications/{applicationId}": {
      "get": {
        "tags": ["Applications"],
        "summary": "Get Application",
        "operationId": "getApplication",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "applicationId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "responses": {
          "200": { "description": "Application details" },
          "404": { "description": "Application not found" }
        }
      },
      "patch": {
        "tags": ["Applications"],
        "summary": "Update Application",
        "description": "Partial update with optimistic locking via `version` field.",
        "operationId": "updateApplication",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "applicationId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/UpdateApplicationRequest" } } }
        },
        "responses": {
          "200": { "description": "Updated" },
          "409": { "description": "Version conflict — refresh and retry" },
          "422": { "description": "Validation error" }
        }
      }
    },
    "/applications/{applicationId}/submit": {
      "post": {
        "tags": ["Applications"],
        "summary": "Submit Application",
        "description": "Lock and submit the application for processing. Triggers KYC stage.",
        "operationId": "submitApplication",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "applicationId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "responses": {
          "200": { "description": "Submitted" },
          "400": { "description": "Cannot submit — incomplete or wrong state" }
        }
      }
    },
    "/applications/{applicationId}/autosave": {
      "patch": {
        "tags": ["Applications"],
        "summary": "Autosave Draft",
        "description": "Auto-save form data without validation locks.",
        "operationId": "autosave",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "applicationId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/AutosaveRequest" } } }
        },
        "responses": {
          "200": { "description": "Saved" }
        }
      }
    },
    "/kyc/consent": {
      "post": {
        "tags": ["KYC"],
        "summary": "Capture Consent",
        "description": "Record OTP-confirmed, timestamped, IP-logged consent for KYC and bureau pull.",
        "operationId": "captureConsent",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ConsentRequest" } } }
        },
        "responses": {
          "200": { "description": "Consent captured" }
        }
      }
    },
    "/kyc/aadhaar/init": {
      "post": {
        "tags": ["KYC"],
        "summary": "Initiate Aadhaar OTP",
        "description": "Send OTP to Aadhaar-linked mobile via UIDAI.",
        "operationId": "initAadhaar",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/AadhaarInitRequest" } } }
        },
        "responses": {
          "200": { "description": "OTP sent", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/AadhaarInitResponse" } } } },
          "503": { "description": "UIDAI unavailable (circuit breaker)" }
        }
      }
    },
    "/kyc/aadhaar/verify": {
      "post": {
        "tags": ["KYC"],
        "summary": "Verify Aadhaar OTP",
        "description": "Verify OTP and retrieve KYC data from UIDAI (name, DOB, address, photo).",
        "operationId": "verifyAadhaar",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/AadhaarVerifyRequest" } } }
        },
        "responses": {
          "200": { "description": "KYC data retrieved", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/KycRecordResponse" } } } },
          "400": { "description": "Invalid OTP" }
        }
      }
    },
    "/kyc/pan/verify": {
      "post": {
        "tags": ["KYC"],
        "summary": "Verify PAN",
        "description": "Verify PAN via NSDL ITD API with name fuzzy matching.",
        "operationId": "verifyPan",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/PanVerifyRequest" } } }
        },
        "responses": {
          "200": { "description": "PAN verified" },
          "400": { "description": "Invalid PAN or name mismatch" }
        }
      }
    },
    "/kyc/face/match": {
      "post": {
        "tags": ["KYC"],
        "summary": "Face Match",
        "description": "Compare selfie against Aadhaar photo. Returns match score (threshold: 0.80).",
        "operationId": "faceMatch",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/FaceMatchRequest" } } }
        },
        "responses": {
          "200": { "description": "Match result" }
        }
      }
    },
    "/documents/presigned-url": {
      "post": {
        "tags": ["Documents"],
        "summary": "Get Presigned URL",
        "description": "Generate a pre-signed MinIO URL for direct browser-to-storage upload. Expires in 15 minutes.",
        "operationId": "getPresignedUrl",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/PresignedUrlRequest" } } }
        },
        "responses": {
          "200": { "description": "Presigned URL generated" }
        }
      }
    },
    "/documents/{documentId}/ocr": {
      "post": {
        "tags": ["Documents"],
        "summary": "Trigger OCR",
        "description": "Submit document for OCR via Karza/Signzy. Returns async — poll for result.",
        "operationId": "triggerOcr",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "documentId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "responses": {
          "202": { "description": "OCR queued" },
          "400": { "description": "Document type not OCR-able" }
        }
      },
      "get": {
        "tags": ["Documents"],
        "summary": "Get OCR Result",
        "description": "Poll for the OCR extraction result of a previously submitted document.",
        "operationId": "getOcrResult",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "documentId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "responses": {
          "200": { "description": "OCR result" },
          "202": { "description": "OCR still processing" },
          "404": { "description": "Document not found" }
        }
      }
    },
    "/documents/{documentId}/review": {
      "post": {
        "tags": ["Documents"],
        "summary": "Review Document",
        "description": "Loan officer approves or rejects a document with remarks.",
        "operationId": "reviewDocument",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "documentId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DocumentReviewRequest" } } }
        },
        "responses": {
          "200": { "description": "Review recorded" }
        }
      }
    },
    "/integration/bureau/pull": {
      "post": {
        "tags": ["Integration"],
        "summary": "Pull Bureau Report",
        "description": "Parallel pull from CIBIL, Experian, Equifax, CRIF. Retry with exponential backoff.",
        "operationId": "pullBureau",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/BureauPullRequest" } } }
        },
        "responses": {
          "202": { "description": "Bureau pull initiated" },
          "429": { "description": "Duplicate pull within 30 days — locked" }
        }
      }
    },
    "/integration/disbursement": {
      "post": {
        "tags": ["Integration"],
        "summary": "Initiate Disbursement",
        "description": "Disburse via IMPS/NEFT/RTGS via NPCI. Idempotent.",
        "operationId": "initiateDisbursement",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DisbursementRequest" } } }
        },
        "responses": {
          "201": { "description": "Disbursement initiated" },
          "409": { "description": "Duplicate request — idempotent" }
        }
      },
      "get": {
        "tags": ["Integration"],
        "summary": "List Disbursements",
        "description": "List all disbursements with optional filtering by applicationId or status.",
        "operationId": "listDisbursements",
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "name": "applicationId", "in": "query", "schema": { "type": "string", "format": "uuid" } },
          { "name": "status", "in": "query", "schema": { "type": "string" } },
          { "name": "page", "in": "query", "schema": { "type": "integer", "default": 0 } },
          { "name": "size", "in": "query", "schema": { "type": "integer", "default": 20 } }
        ],
        "responses": {
          "200": { "description": "Paginated disbursement list" }
        }
      }
    },
    "/decisions/trigger": {
      "post": {
        "tags": ["Decision"],
        "summary": "Trigger Credit Decision",
        "description": "Fetch loan + KYC + bureau data, run 47 rules + ML scorecard, return APPROVED/REJECTED/CONDITIONAL.",
        "operationId": "triggerDecision",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DecisionTriggerRequest" } } }
        },
        "responses": {
          "200": { "description": "Decision computed", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DecisionResponse" } } } },
          "503": { "description": "Bureau data unavailable" }
        }
      }
    },
    "/decisions/{applicationId}": {
      "get": {
        "tags": ["Decision"],
        "summary": "Get Decision Result",
        "operationId": "getDecision",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "applicationId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "responses": {
          "200": { "description": "Decision result", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DecisionResponse" } } } }
        }
      }
    },
    "/decisions/override": {
      "post": {
        "tags": ["Decision"],
        "summary": "Manual Override",
        "description": "Maker-checker override of system decision. Requires elevated role.",
        "operationId": "overrideDecision",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DecisionOverrideRequest" } } }
        },
        "responses": {
          "200": { "description": "Override recorded" },
          "403": { "description": "Insufficient authority for override" }
        }
      }
    },
    "/sanction-letter/{applicationId}/preview": {
      "get": {
        "tags": ["Loan Services"],
        "summary": "Preview Sanction Letter",
        "description": "Get sanction letter data as JSON (no PDF generation).",
        "operationId": "previewSanctionLetter",
        "security": [{ "bearerAuth": [] }],
        "parameters": [{ "name": "applicationId", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }],
        "responses": {
          "200": { "description": "Sanction letter data", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/SanctionLetterData" } } } },
          "400": { "description": "Application not in sanctioned state" }
        }
      }
    },
    "/loan-agreement/generate": {
      "post": {
        "tags": ["Loan Services"],
        "summary": "Generate Loan Agreement",
        "description": "Generate and store the loan agreement PDF.",
        "operationId": "generateAgreement",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "type": "object", "properties": { "applicationId": { "type": "string", "format": "uuid" } }, "required": ["applicationId"] } } }
        },
        "responses": {
          "201": { "description": "Agreement generated" }
        }
      }
    },
    "/loan-agreement/esign/initiate": {
      "post": {
        "tags": ["Loan Services"],
        "summary": "Initiate eSign",
        "description": "Start NSDL eSign process. OTP sent to Aadhaar-linked mobile.",
        "operationId": "initiateESign",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ESignInitiateRequest" } } }
        },
        "responses": {
          "201": { "description": "eSign initiated — OTP sent" }
        }
      }
    },
    "/loan-agreement/esign/verify": {
      "post": {
        "tags": ["Loan Services"],
        "summary": "Verify eSign OTP",
        "description": "Verify OTP and complete the digital signature.",
        "operationId": "verifyESign",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ESignVerifyRequest" } } }
        },
        "responses": {
          "200": { "description": "Document signed" },
          "400": { "description": "Invalid OTP" }
        }
      }
    },
    "/emi/calculate": {
      "post": {
        "tags": ["Loan Services"],
        "summary": "Calculate EMI",
        "operationId": "calculateEmi",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/EmiCalculateRequest" } } }
        },
        "responses": {
          "200": { "description": "EMI calculated" }
        }
      }
    },
    "/notifications/send": {
      "post": {
        "tags": ["Notifications"],
        "summary": "Send Notification",
        "description": "Send SMS or email using a template.",
        "operationId": "sendNotification",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/NotificationSendRequest" } } }
        },
        "responses": {
          "200": { "description": "Notification queued" }
        }
      }
    },
    "/audit-logs": {
      "get": {
        "tags": ["Audit"],
        "summary": "Query Audit Logs",
        "description": "Paginated audit log query for compliance portal.",
        "operationId": "queryAuditLogs",
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "name": "category", "in": "query", "schema": { "type": "string", "enum": ["KYC", "CONSENT", "DATA_ACCESS", "DECISION", "DISBURSEMENT"] } },
          { "name": "applicationId", "in": "query", "schema": { "type": "string", "format": "uuid" } },
          { "name": "actorId", "in": "query", "schema": { "type": "string" } },
          { "name": "dateRange", "in": "query", "schema": { "type": "string", "enum": ["24h", "7d", "30d"], "default": "7d" } },
          { "name": "page", "in": "query", "schema": { "type": "integer", "default": 0 } },
          { "name": "size", "in": "query", "schema": { "type": "integer", "default": 50 } }
        ],
        "responses": {
          "200": { "description": "Paginated audit logs" }
        }
      }
    },
    "/audit-logs/export": {
      "get": {
        "tags": ["Audit"],
        "summary": "Export Audit Logs CSV",
        "operationId": "exportAuditLogs",
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "name": "category", "in": "query", "schema": { "type": "string" } },
          { "name": "dateRange", "in": "query", "schema": { "type": "string", "default": "30d" } }
        ],
        "responses": {
          "200": { "description": "CSV export", "content": { "application/json": { "schema": { "type": "object", "properties": { "csv": { "type": "string" }, "count": { "type": "integer" } } } } } }
        }
      }
    },
    "/auth/register": {
      "post": {
        "tags": ["DSA"],
        "summary": "DSA Partner Registration",
        "description": "Register a new DSA partner. Requires admin approval.",
        "operationId": "dsaRegister",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DsaRegisterRequest" } } }
        },
        "responses": {
          "201": { "description": "Registration submitted — pending approval" }
        }
      }
    },
    "/auth/login": {
      "post": {
        "tags": ["DSA"],
        "summary": "DSA Partner Login",
        "description": "Login for approved DSA partners.",
        "operationId": "dsaLogin",
        "requestBody": {
          "required": true,
          "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DsaLoginRequest" } } }
        },
        "responses": {
          "200": { "description": "Login successful", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/DsaLoginResponse" } } } },
          "401": { "description": "Invalid credentials" }
        }
      }
    },
    "/dashboard": {
      "get": {
        "tags": ["DSA"],
        "summary": "DSA Dashboard",
        "description": "Aggregated statistics for DSA partner dashboard.",
        "operationId": "dsaDashboard",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "Dashboard data" }
        }
      }
    },
    "/auth/profile": {
      "get": {
        "tags": ["Auth"],
        "summary": "Get Current User Profile",
        "description": "Retrieve the authenticated user's profile information.",
        "operationId": "getProfile",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "User profile data" },
          "401": { "description": "Unauthorized" }
        }
      }
    },
    "/applications/{applicationId}/history": {
      "get": {
        "tags": ["Applications"],
