# External Secrets Operator — syncs Vault → K8s secrets
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  namespace: vault
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "los-platform"
---
# ExternalSecret — auth-service secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: los-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: auth-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: los/auth-service
        property: jwt_private_key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: los/auth-service
        property: jwt_public_key
    - secretKey: OTP_ENCRYPTION_KEY
      remoteRef:
        key: los/auth-service
        property: otp_encryption_key
    - secretKey: LDAP_BIND_PASSWORD
      remoteRef:
        key: los/auth-service
        property: ldap_bind_password
    - secretKey: SMS_API_KEY
      remoteRef:
        key: los/auth-service
        property: sms_api_key
