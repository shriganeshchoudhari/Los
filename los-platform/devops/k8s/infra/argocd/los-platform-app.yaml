# ArgoCD Application — bootstraps LOS Platform GitOps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: los-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/los-platform.git
    targetRevision: HEAD
    path: devops/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: los-platform-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
