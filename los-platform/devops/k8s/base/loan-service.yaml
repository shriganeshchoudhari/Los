apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service
  labels:
    app: los
    service: loan-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: los
      service: loan-service
  template:
    metadata:
      labels:
        app: los
        service: loan-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: los-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: loan-service
          image: ${ECR_REGISTRY}/loan-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: DB_HOST
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              value: "los_loan"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: KAFKA_BROKERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: JWT_SECRET
            - name: OTEL_SERVICE_NAME
              value: "loan-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PROPAGATORS
              value: "b3,tracecontext"
            - name: NODE_OPTIONS
              value: "-r @opentelemetry/auto-instrumentations-node/register"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: los
              service: loan-service

---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
  labels:
    app: los
    service: loan-service
spec:
  type: ClusterIP
  ports:
    - port: 3003
      targetPort: 3003
      protocol: TCP
      name: http
  selector:
    app: los
    service: loan-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loan-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loan-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loan-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: los
      service: loan-service
