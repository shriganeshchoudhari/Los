apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyc-service
  labels:
    app: los
    service: kyc-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: los
      service: kyc-service
  template:
    metadata:
      labels:
        app: los
        service: kyc-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: los-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: kyc-service
          image: ${ECR_REGISTRY}/kyc-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: DB_HOST
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              value: "los_kyc"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: KAFKA_BROKERS
            - name: UIDAI_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: UIDAI_LICENSE_KEY
            - name: DIGILOCKER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DIGILOCKER_CLIENT_ID
            - name: DIGILOCKER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DIGILOCKER_CLIENT_SECRET
            - name: DIGILOCKER_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DIGILOCKER_REDIRECT_URI
            - name: OTEL_SERVICE_NAME
              value: "kyc-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PROPAGATORS
              value: "b3,tracecontext"
            - name: NODE_OPTIONS
              value: "-r @opentelemetry/auto-instrumentations-node/register"
          resources:
            requests:
              memory: "384Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: los
              service: kyc-service

---
apiVersion: v1
kind: Service
metadata:
  name: kyc-service
  labels:
    app: los
    service: kyc-service
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
      name: http
  selector:
    app: los
    service: kyc-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kyc-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kyc-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kyc-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: los
      service: kyc-service
