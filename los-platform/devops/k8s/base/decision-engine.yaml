apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  labels:
    app: los
    service: decision-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: los
      service: decision-engine
  template:
    metadata:
      labels:
        app: los
        service: decision-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: los-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: decision-engine
          image: ${ECR_REGISTRY}/decision-engine:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3004"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: DB_HOST
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: los-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              value: "los_decision"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: los-config
                  key: KAFKA_BROKERS
            - name: LOAN_SERVICE_URL
              value: "http://loan-service:3003"
            - name: KYC_SERVICE_URL
              value: "http://kyc-service:3002"
            - name: INTEGRATION_SERVICE_URL
              value: "http://integration-service:3006"
            - name: OTEL_SERVICE_NAME
              value: "decision-engine"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PROPAGATORS
              value: "b3,tracecontext"
            - name: NODE_OPTIONS
              value: "-r @opentelemetry/auto-instrumentations-node/register"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: los
              service: decision-engine

---
apiVersion: v1
kind: Service
metadata:
  name: decision-engine
  labels:
    app: los
    service: decision-engine
spec:
  type: ClusterIP
  ports:
    - port: 3004
      targetPort: 3004
      protocol: TCP
      name: http
  selector:
    app: los
    service: decision-engine

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: decision-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: decision-engine
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: decision-engine
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: los
      service: decision-engine
