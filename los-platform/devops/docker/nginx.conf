# LOS Platform — Local API Gateway (Nginx)
# Routes all frontend requests to the correct microservice port.
# In production, replace with Kong API Gateway (see devops/kong/).

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_request_id"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # ── Auth Service ─────────────────────────────────────────────────────────────
  upstream auth_svc {
    server auth-service:3001;
  }

  # ── KYC Service ─────────────────────────────────────────────────────────────
  upstream kyc_svc {
    server kyc-service:3002;
  }

  # ── Loan Service ─────────────────────────────────────────────────────────────
  upstream loan_svc {
    server loan-service:3003;
  }

  # ── Document Service ─────────────────────────────────────────────────────────
  upstream document_svc {
    server document-service:3009;
  }

  # ── Decision Engine ──────────────────────────────────────────────────────────
  upstream decision_svc {
    server decision-engine:3004;
  }

  # ── Integration Service ──────────────────────────────────────────────────────
  upstream integration_svc {
    server integration-service:3006;
  }

  # ── Notification Service ─────────────────────────────────────────────────────
  upstream notification_svc {
    server notification-service:3007;
  }

  # ── DSA Service ─────────────────────────────────────────────────────────────
  upstream dsa_svc {
    server dsa-service:3008;
  }

  server {
    listen 8000;
    server_name localhost;

    # CORS headers for all routes
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id, X-Correlation-Id' always;

    # Pass correlation IDs to upstream
    proxy_set_header X-Request-Id $http_x_request_id;
    proxy_set_header X-Correlation-Id $http_x_correlation_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;

    # Timeout settings
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── /auth/* → Auth Service ────────────────────────────────────────────────
    location /auth/ {
      proxy_pass http://auth_svc/auth/;
    }

    # ── /kyc/* → KYC Service ──────────────────────────────────────────────────
    location /kyc/ {
      proxy_pass http://kyc_svc/kyc/;
    }

    # ── /applications/* → Loan Service ────────────────────────────────────────
    location /applications/ {
      proxy_pass http://loan_svc/applications/;
    }

    location /loan-agreement/ {
      proxy_pass http://loan_svc/loan-agreement/;
    }

    location /sanction-letter/ {
      proxy_pass http://loan_svc/sanction-letter/;
    }

    # ── /audit-logs/* → Loan Service (audit service schema) ──────────────────
    location /audit-logs/ {
      proxy_pass http://loan_svc/audit-logs/;
    }

    # ── /documents/* → Document Service ───────────────────────────────────────
    location /documents/ {
      proxy_pass http://document_svc/documents/;
    }

    # ── /decisions/* → Decision Engine ────────────────────────────────────────
    location /decisions/ {
      proxy_pass http://decision_svc/decisions/;
    }

    # ── /integration/* → Integration Service ───────────────────────────────────
    location /integration/ {
      proxy_pass http://integration_svc/integration/;
    }

    # ── /notifications/* → Notification Service ────────────────────────────────
    location /notifications/ {
      proxy_pass http://notification_svc/notifications/;
    }

    # ── /dsa/* → DSA Service ──────────────────────────────────────────────────
    location /dsa/ {
      proxy_pass http://dsa_svc/dsa/;
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 'OK';
      add_header Content-Type text/plain;
    }

    # ── OPTIONS (CORS preflight) ──────────────────────────────────────────────
    location = / {
      return 404 '{"error":"not_found","message":"API Gateway — use /auth/, /kyc/, /applications/, /documents/, /decisions/, /integration/, /notifications/, /dsa/ routes"}';
      add_header Content-Type application/json;
    }
  }
}
