# LOS Platform — Local API Gateway (Nginx)
# Routes all frontend requests to the single Spring Boot monolith.
# In production, replace with Kong API Gateway (see devops/kong/).

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_request_id"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # ── Java Backend Monolith ────────────────────────────────────────────────────
  upstream backend_monolith {
    server backend:8082;
  }

  server {
    listen 8000;
    server_name localhost;

    # Pass headers to upstream
    proxy_set_header X-Request-Id $http_x_request_id;
    proxy_set_header X-Correlation-Id $http_x_correlation_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;

    # Timeout settings
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── API Routing ───────────────────────────────────────────────────────────
    # All /api/* requests go to the Spring Boot backend
    location /api/ {
      # Handle OPTIONS preflight at gateway level if needed, 
      # but backend is already configured for it.
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id, X-Correlation-Id' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
      }
      proxy_pass http://backend_monolith/api/;
    }

    # Handle legacy routes by mapping directly to backend API
    location /auth/ {
      proxy_pass http://backend_monolith/api/auth/;
    }

    location /kyc/ {
      proxy_pass http://backend_monolith/api/kyc/;
    }

    location /applications/ {
      proxy_pass http://backend_monolith/api/applications/;
    }

    location /loan-agreement/ {
      proxy_pass http://backend_monolith/api/loan-agreement/;
    }

    location /sanction-letter/ {
      proxy_pass http://backend_monolith/api/sanction-letter/;
    }

    location /audit-logs/ {
      proxy_pass http://backend_monolith/api/audit-logs/;
    }

    location /documents/ {
      proxy_pass http://backend_monolith/api/documents/;
    }

    location /decisions/ {
      proxy_pass http://backend_monolith/api/decisions/;
    }

    location /integration/ {
      proxy_pass http://backend_monolith/api/integration/;
    }

    location /notifications/ {
      proxy_pass http://backend_monolith/api/notifications/;
    }

    location /dsa/ {
      proxy_pass http://backend_monolith/api/dsa/;
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    location /health {
      access_log off;
      proxy_pass http://backend_monolith/actuator/health;
    }

    # ── Fallback ─────────────────────────────────────────────────────────────
    location = / {
      return 200 '{"status":"UP","message":"LOS Platform API Gateway (Spring Boot Monolith)"}';
      add_header Content-Type application/json;
    }
  }
}
