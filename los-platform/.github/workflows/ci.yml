name: LOS Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Code Quality ──────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/common/package.json

      - name: Install all workspace dependencies
        run: |
          cd backend/common && npm ci
          cd ../auth-service && npm ci
          cd ../kyc-service && npm ci
          cd ../loan-service && npm ci
          cd ../decision-engine && npm ci
          cd ../integration-service && npm ci
          cd ../notification-service && npm ci
          cd ../dsa-service && npm ci
          cd ../document-service && npm ci

      - name: Build @los/common
        run: cd backend/common && npm run build

      - name: Run lint
        run: |
          for svc in auth-service kyc-service loan-service decision-engine integration-service notification-service dsa-service document-service; do
            echo "Linting $svc..."
            cd backend/$svc && npx eslint "src/**/*.ts" --max-warnings 0 || exit 1
            cd ../..
          done

      - name: Typecheck
        run: |
          for svc in auth-service kyc-service loan-service decision-engine integration-service notification-service dsa-service document-service; do
            echo "Type-checking $svc..."
            cd backend/$svc && npx tsc --noEmit || exit 1
            cd ../..
          done

  # ── Database Migration ────────────────────────────────────────────────────
  database-migration:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: los_user
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create test databases
        run: |
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_auth;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_loan;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_kyc;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_decision;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_integration;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_document;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_notification;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_dsa;"
          PGPASSWORD=test_password psql -h localhost -U los_user -c "CREATE DATABASE los_shared;"

      - name: Install ts-node
        run: npm install -g ts-node

      - name: Run migrations (dry-run first, then apply)
        run: |
          cd backend
          ts-node scripts/migrate.ts --env=dev --dry-run
          ts-node scripts/migrate.ts --env=dev
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: los_user
          DB_PASSWORD: test_password

  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-tests:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - kyc-service
          - loan-service
          - decision-engine
          - integration-service
          - notification-service
          - dsa-service
          - document-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/${{ matrix.service }}/package.json

      - name: Install dependencies
        run: |
          cd backend/common && npm ci && npm run build
          cd ../${{ matrix.service }} && npm ci

      - name: Run tests
        run: cd backend/${{ matrix.service }} && npm test -- --coverage --passWithNoTests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          JWT_SECRET: test_secret_minimum_32_characters

  # ── Frontend Build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

  # ── Docker Build (all services) ─────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - kyc-service
          - loan-service
          - decision-engine
          - integration-service
          - notification-service
          - dsa-service
          - document-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        run: |
          SERVICE=${{ matrix.service }}
          docker build \
            -t $ECR_REGISTRY/$SERVICE:$IMAGE_TAG \
            -t $ECR_REGISTRY/$SERVICE:latest \
            --build-arg SERVICE_NAME=$SERVICE \
            -f devops/docker/Dockerfile.backend \
            backend
          docker push $ECR_REGISTRY/$SERVICE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$SERVICE:latest

  # ── Frontend Docker Build ────────────────────────────────────────────────
  frontend-docker-build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend
        run: |
          docker build \
            -t $ECR_REGISTRY/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/frontend:latest \
            -f devops/docker/Dockerfile.frontend \
            frontend
          docker push $ECR_REGISTRY/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/frontend:latest

  # ── Deploy to Dev ────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: [docker-build, frontend-docker-build]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Dev EKS
        run: |
          aws eks update-kubeconfig --name los-dev-cluster --region ${{ env.AWS_REGION }}
          kubectl apply -k devops/k8s/overlays/dev/
          kubectl rollout status deployment/auth-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/loan-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/kyc-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/decision-engine -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/integration-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/notification-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/dsa-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/document-service -n los-platform-dev --timeout=120s
          kubectl rollout status deployment/frontend -n los-platform-dev --timeout=120s

  # ── Deploy to UAT ───────────────────────────────────────────────────────
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker-build, frontend-docker-build]
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to UAT EKS
        run: |
          aws eks update-kubeconfig --name los-uat-cluster --region ${{ env.AWS_REGION }}
          kubectl apply -k devops/k8s/overlays/uat/
          kubectl rollout status deployment/auth-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/loan-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/kyc-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/decision-engine -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/integration-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/notification-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/dsa-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/document-service -n los-platform-uat --timeout=180s
          kubectl rollout status deployment/frontend -n los-platform-uat --timeout=180s
